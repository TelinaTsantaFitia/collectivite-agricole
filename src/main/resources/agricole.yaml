openapi: 3.0.3
info:
  title: Federation Agricole API
  version: 2.0.0

servers:
  - url: http://localhost:8080/api

components:
  schemas:

    Collectivite:
      type: object
      required: [nom, ville, specialite]
      properties:
        id:
          type: integer
        nom:
          type: string
        ville:
          type: string
        specialite:
          type: string
        dateCreation:
          type: string
          format: date

    Parrain:
      type: object
      required: [membreId, relation]
      properties:
        membreId:
          type: integer
        collectiviteId:
          type: integer
        relation:
          type: string

    Membre:
      type: object
      required: [nom, prenom, dateNaissance, genre, telephone, email]
      properties:
        id:
          type: integer
        nom:
          type: string
        prenom:
          type: string
        dateNaissance:
          type: string
          format: date
        genre:
          type: string
          enum: [M, F]
        adresse:
          type: string
        metier:
          type: string
        telephone:
          type: string
        email:
          type: string
        dateAdhesion:
          type: string
          format: date
        parrains:
          type: array
          items:
            $ref: '#/components/schemas/Parrain'

    AdmissionRequest:
      type: object
      required: [membre, montantAdhesion, montantCotisation]
      properties:
        membre:
          $ref: '#/components/schemas/Membre'
        montantAdhesion:
          type: number
          example: 50000
        montantCotisation:
          type: number
          example: 200000

    Cotisation:
      type: object
      properties:
        montant:
          type: number
        date:
          type: string
          format: date
        modePaiement:
          type: string
          enum: [ESPECE, MOBILE_MONEY, VIREMENT]

    Compte:
      type: object
      properties:
        type:
          type: string
          enum: [CAISSE, BANCAIRE, MOBILE]
        titulaire:
          type: string
        banque:
          type: string
        numeroCompte:
          type: string
        telephone:
          type: string
        solde:
          type: number

    Activite:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        obligatoire:
          type: boolean
        date:
          type: string
          format: date

    Presence:
      type: object
      properties:
        membreId:
          type: integer
        present:
          type: boolean
        excuse:
          type: boolean

    StatistiqueMembre:
      type: object
      properties:
        tauxAssiduite:
          type: number
        montantPaye:
          type: number
        montantImpayes:
          type: number

    StatistiqueCollectivite:
      type: object
      properties:
        tauxAssiduiteGlobal:
          type: number
        nombreMembres:
          type: integer

    StatistiqueFederation:
      type: object
      properties:
        collectiviteId:
          type: integer
        tauxAssiduiteGlobal:
          type: number
        pourcentageCotisationAJour:
          type: number
        nouveauxAdherents:
          type: integer

paths:

  # A - Collectivite
  /collectivites:
    post:
      summary: Creer collectivite
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Collectivite'
      responses:
        201:
          description: OK
        400:
          description: Conditions non respectees

  # B - Admission ( B-2)
  /collectivites/{id}/admissions:
    post:
      summary: Admission nouveau membre (avec nouvelles regles)
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdmissionRequest'
      responses:
        201:
          description: Membre admis
        400:
          description: Conditions non respectees (parrainage, paiement...)

  # changement collectivite / demission
  /membres/{id}/changer-collectivite:
    put:
      summary: Changer de collectivite
      parameters:
        - name: id
          in: path
          required: true
      responses:
        200:
          description: OK

  /membres/{id}/demission:
    put:
      summary: Demission membre
      parameters:
        - name: id
          in: path
          required: true
      responses:
        200:
          description: OK

  # C - Cotisations
  /collectivites/{id}/cotisations:
    post:
      summary: Ajouter cotisation
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cotisation'
      responses:
        201:
          description: OK

  # D - Comptes
  /collectivites/{id}/comptes:
    post:
      summary: Ajouter compte
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Compte'
      responses:
        201:
          description: OK

    get:
      summary: Liste comptes
      responses:
        200:
          description: OK

  # E - Activites
  /collectivites/{id}/activites:
    post:
      summary: Creer activite
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activite'
      responses:
        201:
          description: OK

  /federation/activites:
    post:
      summary: Activite federation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Activite'
      responses:
        201:
          description: OK

  # F - Presence
  /activites/{id}/presences:
    post:
      summary: Enregistrer presence
      parameters:
        - name: id
          in: path
          required: true
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Presence'
      responses:
        200:
          description: OK

  # G - Statistiques collectivite
  /collectivites/{id}/statistiques:
    get:
      summary: Stats collectivite
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatistiqueCollectivite'

  /membres/{id}/statistiques:
    get:
      summary: Stats membre
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatistiqueMembre'

  # H - Statistiques federation
  /federation/statistiques:
    get:
      summary: Rapport federation
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatistiqueFederation'